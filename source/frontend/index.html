<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SIS Teknik Platform</title>
    <script>
      // Sistem tercihine göre anında dark/light + kayıtlı tema uygula (flash yok)
      (function() {
        var html = document.documentElement;
        // Dark mode
        var mq = window.matchMedia('(prefers-color-scheme: dark)');
        function applyDark(dark) { html.classList.toggle('dark', dark); }
        applyDark(mq.matches);
        mq.addEventListener('change', function(e) { applyDark(e.matches); });
        // Renk teması
        var saved = localStorage.getItem('md3-theme');
        if (saved && saved !== 'purple') {
          html.setAttribute('data-theme', saved);
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <link data-trunk rel="css" href="style/output.css" />
</head>
<body>
    <script>
    // Resmi max 300KB base64'e sıkıştır. Canvas ile resize + quality düşürme.
    // Promise<string> döner (data:image/jpeg;base64,... formatında) veya boş string.
    window.__compressImageToBase64 = function(file, maxBytes) {
      maxBytes = maxBytes || 307200; // 300 KB
      return new Promise(function(resolve) {
        if (!file || !file.type.startsWith('image/')) {
          // Resim değilse (PDF vb.) — şimdilik boş dön
          resolve('');
          return;
        }
        var reader = new FileReader();
        reader.onload = function(e) {
          var img = new Image();
          img.onload = function() {
            var canvas = document.createElement('canvas');
            var w = img.width;
            var h = img.height;

            // Kaliteyi düşürerek 300KB'a sığdır
            function tryCompress(scale, quality) {
              canvas.width = Math.round(w * scale);
              canvas.height = Math.round(h * scale);
              var ctx = canvas.getContext('2d');
              ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
              return canvas.toDataURL('image/jpeg', quality);
            }

            // Önce orijinal boyut, kaliteyi düşür
            var qualities = [0.8, 0.6, 0.4, 0.3, 0.2];
            var scales = [1.0, 0.75, 0.5, 0.35, 0.25, 0.15];
            
            for (var si = 0; si < scales.length; si++) {
              for (var qi = 0; qi < qualities.length; qi++) {
                var dataUrl = tryCompress(scales[si], qualities[qi]);
                // base64 boyut hesabı: data URL'den header çıkar, kalan base64
                var base64Part = dataUrl.split(',')[1] || '';
                var byteSize = Math.ceil(base64Part.length * 3 / 4);
                if (byteSize <= maxBytes) {
                  resolve(dataUrl);
                  return;
                }
              }
            }
            // En küçük hali bile büyükse, son denemeyi ver
            resolve(tryCompress(0.1, 0.1));
          };
          img.onerror = function() { resolve(''); };
          img.src = e.target.result;
        };
        reader.onerror = function() { resolve(''); };
        reader.readAsDataURL(file);
      });
    };

    window.__openBase64Image = function(dataUrl, filename) {
      var title = filename || 'image.jpg';
      var parts = dataUrl.split(',');
      var mime = parts[0].match(/:(.*?);/)[1];
      var bstr = atob(parts[1]);
      var n = bstr.length;
      var u8arr = new Uint8Array(n);
      for (var i = 0; i < n; i++) { u8arr[i] = bstr.charCodeAt(i); }
      var imgBlob = new Blob([u8arr], { type: mime });
      var imgUrl = URL.createObjectURL(imgBlob);
      var html = '<!DOCTYPE html><html><head><meta charset="utf-8"><title>' + title + '</title></head>'
        + '<body style="margin:0;background:#1a1a1a;display:flex;flex-direction:column;align-items:center">'
        + '<div style="padding:8px;background:#333;width:100%;display:flex;justify-content:center">'
        + '<a href="' + imgUrl + '" download="' + title + '" style="color:#fff;background:#6750A4;padding:8px 20px;border-radius:8px;text-decoration:none;font-family:sans-serif;font-size:14px">Indir: ' + title + '</a></div>'
        + '<div style="flex:1;display:flex;justify-content:center;align-items:center;min-height:calc(100vh - 52px)">'
        + '<img src="' + imgUrl + '" style="max-width:100%;max-height:calc(100vh - 52px);object-fit:contain" /></div>'
        + '</body></html>';
      var pageBlob = new Blob([html], { type: 'text/html;charset=utf-8' });
      var pageUrl = URL.createObjectURL(pageBlob);
      window.open(pageUrl, '_blank');
    };
    </script>
</body>
</html>
